name: Daily News Scraper

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PW: ${{ secrets.GMAIL_PW }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 이 토큰은 GitHub이 알아서 생성해줍니다
        run: python news_bot.py # 바뀐 파일명 확인!
